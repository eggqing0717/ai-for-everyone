<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7" fill="#2D3748"/>
</marker>
<filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
  <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
</filter>
</defs>
<rect x="0" y="0" width="800" height="450" rx="0" fill="#F8FAFE"/>
<text x="400" y="30" font-size="20" fill="#2D3748" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Q/K/V Attention Computation</text>
<text x="400" y="52" font-size="12" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Attention(Q,K,V) = softmax(QK^T / √d_k) × V</text>
<text x="80" y="85" font-size="12" fill="#2D3748" text-anchor="start" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Step 1: Linear Projections</text>
<rect x="40" y="100" width="80" height="100" rx="6" fill="#EBF4FF" stroke="#2E7BF6" stroke-width="1.5"/>
<text x="80" y="130" font-size="16" fill="#2E7BF6" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">X</text>
<text x="80" y="155" font-size="10" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">(n × d)</text>
<text x="80" y="175" font-size="10" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Input</text>
<line x1="125" y1="120" x2="175" y2="105" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<line x1="125" y1="150" x2="175" y2="150" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<line x1="125" y1="180" x2="175" y2="195" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<text x="155" y="95" font-size="10" fill="#2E7BF6" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">W_Q</text>
<text x="155" y="143" font-size="10" fill="#22C1A6" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">W_K</text>
<text x="155" y="192" font-size="10" fill="#FF8A3D" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">W_V</text>
<rect x="180" y="85" width="65" height="40" rx="6" fill="#2E7BF6" opacity="0.2"/>
<rect x="180" y="85" width="65" height="40" rx="6" fill="none" stroke="#2E7BF6" stroke-width="2"/>
<text x="212" y="108" font-size="14" fill="#2E7BF6" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Q</text>
<rect x="180" y="133" width="65" height="40" rx="6" fill="#22C1A6" opacity="0.2"/>
<rect x="180" y="133" width="65" height="40" rx="6" fill="none" stroke="#22C1A6" stroke-width="2"/>
<text x="212" y="156" font-size="14" fill="#22C1A6" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">K</text>
<rect x="180" y="180" width="65" height="40" rx="6" fill="#FF8A3D" opacity="0.2"/>
<rect x="180" y="180" width="65" height="40" rx="6" fill="none" stroke="#FF8A3D" stroke-width="2"/>
<text x="212" y="203" font-size="14" fill="#FF8A3D" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">V</text>
<text x="320" y="85" font-size="12" fill="#2D3748" text-anchor="start" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Step 2: Attention Scores</text>
<line x1="250" y1="105" x2="310" y2="140" stroke="#2E7BF6" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<line x1="250" y1="153" x2="310" y2="150" stroke="#22C1A6" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<rect x="315" y="110" width="90" height="90" rx="6" fill="#EBF4FF" stroke="#2E7BF6" stroke-width="1.5" opacity="0.5"/>
<text x="360" y="140" font-size="12" fill="#2E7BF6" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Q × K^T</text>
<text x="360" y="162" font-size="10" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">(n × n)</text>
<text x="360" y="182" font-size="10" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">scores</text>
<line x1="410" y1="155" x2="450" y2="155" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<text x="430" y="143" font-size="10" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">÷√d_k</text>
<text x="470" y="85" font-size="12" fill="#2D3748" text-anchor="start" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Step 3: Softmax</text>
<rect x="455" y="120" width="90" height="70" rx="6" fill="#E6FAF5" stroke="#22C1A6" stroke-width="1.5"/>
<text x="500" y="148" font-size="12" fill="#22C1A6" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Softmax</text>
<text x="500" y="170" font-size="10" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">(weights)</text>
<text x="600" y="85" font-size="12" fill="#2D3748" text-anchor="start" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Step 4: Output</text>
<line x1="550" y1="155" x2="590" y2="155" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<text x="570" y="143" font-size="10" fill="#FF8A3D" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">× V</text>
<line x1="250" y1="200" x2="600" y2="200" stroke="#FF8A3D" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<rect x="600" y="120" width="80" height="100" rx="6" fill="#FFF3EB" stroke="#FF8A3D" stroke-width="1.5"/>
<text x="640" y="155" font-size="13" fill="#FF8A3D" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Output</text>
<text x="640" y="178" font-size="10" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">(n × d_v)</text>
<text x="640" y="200" font-size="10" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Context</text>
<rect x="40" y="260" width="720" height="170" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="400" y="285" font-size="13" fill="#2D3748" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Example: &quot;The cat sat on the mat&quot;</text>
<text x="100" y="315" font-size="12" fill="#2D3748" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">The</text>
<text x="210" y="315" font-size="12" fill="#2D3748" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">cat</text>
<text x="320" y="315" font-size="12" fill="#2D3748" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">sat</text>
<text x="430" y="315" font-size="12" fill="#2D3748" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">on</text>
<text x="540" y="315" font-size="12" fill="#2D3748" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">the</text>
<text x="650" y="315" font-size="12" fill="#2D3748" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">mat</text>
<text x="60" y="345" font-size="11" fill="#2E7BF6" text-anchor="end" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">&quot;cat&quot;→</text>
<rect x="70" y="330" width="60" height="30" rx="4" fill="#2E7BF6" opacity="0.2"/>
<text x="100" y="345" font-size="10" fill="#2D3748" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">0.10</text>
<rect x="180" y="330" width="60" height="30" rx="4" fill="#2E7BF6" opacity="0.4"/>
<text x="210" y="345" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">0.30</text>
<rect x="290" y="330" width="60" height="30" rx="4" fill="#2E7BF6" opacity="0.4"/>
<text x="320" y="345" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">0.30</text>
<rect x="400" y="330" width="60" height="30" rx="4" fill="#2E7BF6" opacity="0.15000000000000002"/>
<text x="430" y="345" font-size="10" fill="#2D3748" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">0.05</text>
<rect x="510" y="330" width="60" height="30" rx="4" fill="#2E7BF6" opacity="0.15000000000000002"/>
<text x="540" y="345" font-size="10" fill="#2D3748" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">0.05</text>
<rect x="620" y="330" width="60" height="30" rx="4" fill="#2E7BF6" opacity="0.30000000000000004"/>
<text x="650" y="345" font-size="10" fill="#2D3748" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">0.20</text>
<text x="400" y="390" font-size="11" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Attention weights sum to 1.0 (probability distribution)</text>
<text x="210" y="410" font-size="11" fill="#2E7BF6" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">↑ High attention to related words</text>
</svg>