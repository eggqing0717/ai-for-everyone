<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7" fill="#2D3748"/>
</marker>
<filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
  <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
</filter>
</defs>
<rect x="0" y="0" width="800" height="450" rx="0" fill="#F8FAFE"/>
<text x="400" y="40" font-size="22" fill="#2D3748" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Dataset Split: Train / Validation / Test</text>
<text x="400" y="85" font-size="14" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Full Dataset (100%)</text>
<rect x="80" y="100" width="640" height="50" rx="8" fill="#E2E8F0"/>
<rect x="80" y="100" width="384" height="50" rx="8" fill="#2E7BF6" opacity="0.8"/>
<text x="272" y="125" font-size="14" fill="#FFFFFF" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Training Set (60%)</text>
<rect x="464" y="100" width="128" height="50" rx="0" fill="#22C1A6" opacity="0.8"/>
<text x="528" y="125" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Val (20%)</text>
<rect x="592" y="100" width="128" height="50" rx="8" fill="#FF8A3D" opacity="0.8"/>
<text x="656" y="125" font-size="13" fill="#FFFFFF" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Test (20%)</text>
<rect x="60" y="190" width="220" height="130" rx="10" fill="#FFFFFF" stroke="#2E7BF6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="60" y="190" width="220" height="32" rx="10" fill="#2E7BF6" opacity="0.15"/>
<text x="170" y="208" font-size="13" fill="#2E7BF6" text-anchor="middle" font-weight="700" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Training Set</text>
<text x="80" y="245" font-size="11" fill="#2D3748" text-anchor="start" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">• Learn patterns from data</text>
<text x="80" y="265" font-size="11" fill="#2D3748" text-anchor="start" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">• Update model weights</text>
<text x="80" y="285" font-size="11" fill="#2D3748" text-anchor="start" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">• Largest portion</text>
<text x="80" y="305" font-size="11" fill="#718096" text-anchor="start" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">• Used every epoch</text>
<rect x="300" y="190" width="200" height="130" rx="10" fill="#FFFFFF" stroke="#22C1A6" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="300" y="190" width="200" height="32" rx="10" fill="#22C1A6" opacity="0.15"/>
<text x="400" y="208" font-size="13" fill="#22C1A6" text-anchor="middle" font-weight="700" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Validation Set</text>
<text x="320" y="245" font-size="11" fill="#2D3748" text-anchor="start" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">• Tune hyperparams</text>
<text x="320" y="265" font-size="11" fill="#2D3748" text-anchor="start" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">• Monitor overfitting</text>
<text x="320" y="285" font-size="11" fill="#2D3748" text-anchor="start" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">• No weight updates</text>
<text x="320" y="305" font-size="11" fill="#718096" text-anchor="start" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">• Used each epoch end</text>
<rect x="520" y="190" width="220" height="130" rx="10" fill="#FFFFFF" stroke="#FF8A3D" stroke-width="1.5" filter="url(#shadow)"/>
<rect x="520" y="190" width="220" height="32" rx="10" fill="#FF8A3D" opacity="0.15"/>
<text x="630" y="208" font-size="13" fill="#FF8A3D" text-anchor="middle" font-weight="700" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Test Set</text>
<text x="540" y="245" font-size="11" fill="#2D3748" text-anchor="start" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">• Final evaluation only</text>
<text x="540" y="265" font-size="11" fill="#2D3748" text-anchor="start" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">• Never seen in training</text>
<text x="540" y="285" font-size="11" fill="#2D3748" text-anchor="start" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">• Simulates real-world</text>
<text x="540" y="305" font-size="11" fill="#718096" text-anchor="start" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">• Used once at the end</text>
<text x="400" y="365" font-size="14" fill="#2D3748" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Workflow</text>
<g>
<rect x="100" y="385" width="100" height="36" rx="8" fill="#2E7BF6" stroke="#2E7BF6" stroke-width="1.5" opacity="0.3"/>
<rect x="100" y="385" width="100" height="36" rx="8" fill="none" stroke="#2E7BF6" stroke-width="1.5"/>
<text x="150" y="403" font-size="13" fill="#2D3748" text-anchor="middle" font-weight="500" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Train</text>
<line x1="208" y1="403" x2="257" y2="403" stroke="#718096" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<rect x="265" y="385" width="100" height="36" rx="8" fill="#22C1A6" stroke="#22C1A6" stroke-width="1.5" opacity="0.3"/>
<rect x="265" y="385" width="100" height="36" rx="8" fill="none" stroke="#22C1A6" stroke-width="1.5"/>
<text x="315" y="403" font-size="13" fill="#2D3748" text-anchor="middle" font-weight="500" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Validate</text>
<line x1="373" y1="403" x2="422" y2="403" stroke="#718096" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<rect x="430" y="385" width="100" height="36" rx="8" fill="#22C1A6" stroke="#22C1A6" stroke-width="1.5" opacity="0.3"/>
<rect x="430" y="385" width="100" height="36" rx="8" fill="none" stroke="#22C1A6" stroke-width="1.5"/>
<text x="480" y="403" font-size="13" fill="#2D3748" text-anchor="middle" font-weight="500" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Tune</text>
<line x1="538" y1="403" x2="587" y2="403" stroke="#718096" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<rect x="595" y="385" width="100" height="36" rx="8" fill="#FF8A3D" stroke="#FF8A3D" stroke-width="1.5" opacity="0.3"/>
<rect x="595" y="385" width="100" height="36" rx="8" fill="none" stroke="#FF8A3D" stroke-width="1.5"/>
<text x="645" y="403" font-size="13" fill="#2D3748" text-anchor="middle" font-weight="500" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Test</text>
</g>
</svg>