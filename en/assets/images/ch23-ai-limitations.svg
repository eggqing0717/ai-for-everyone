<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7" fill="#2D3748"/>
</marker>
<filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
  <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
</filter>
</defs>
<rect x="0" y="0" width="800" height="450" rx="0" fill="#F8FAFE"/>
<text x="400" y="40" font-size="22" fill="#2D3748" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">AI&apos;s Three Major Limitations</text>
<text x="400" y="65" font-size="12" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Understanding the boundaries helps us use AI wisely</text>
<rect x="50" y="100" width="220" height="300" rx="16" fill="#FFFFFF" stroke="#FF8A3D" stroke-width="1.5" filter="url(#shadow)"/>
<circle cx="160" cy="165" r="40" fill="#FFF3EB"/>
<text x="160" y="160" font-size="28" fill="#2D3748" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">❓</text>
<text x="160" y="175" font-size="20" fill="#2D3748" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">🤖</text>
<text x="160" y="225" font-size="16" fill="#FF8A3D" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Hallucination</text>
<text x="160" y="252" font-size="12" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Confidently outputs</text>
<text x="160" y="270" font-size="12" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">wrong or fabricated</text>
<text x="160" y="288" font-size="12" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">information</text>
<rect x="80" y="310" width="160" height="30" rx="6" fill="#FFF3EB"/>
<text x="160" y="325" font-size="11" fill="#FF8A3D" text-anchor="middle" font-weight="500" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">&quot;Makes stuff up&quot;</text>
<rect x="290" y="100" width="220" height="300" rx="16" fill="#FFFFFF" stroke="#2E7BF6" stroke-width="1.5" filter="url(#shadow)"/>
<circle cx="400" cy="165" r="40" fill="#EBF4FF"/>
<text x="400" y="165" font-size="28" fill="#2D3748" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">📅</text>
<text x="400" y="225" font-size="16" fill="#2E7BF6" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Knowledge Cutoff</text>
<text x="400" y="252" font-size="12" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Doesn&apos;t know about</text>
<text x="400" y="270" font-size="12" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">events after its</text>
<text x="400" y="288" font-size="12" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">training date</text>
<rect x="320" y="310" width="160" height="30" rx="6" fill="#EBF4FF"/>
<text x="400" y="325" font-size="11" fill="#2E7BF6" text-anchor="middle" font-weight="500" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">&quot;Stuck in the past&quot;</text>
<rect x="530" y="100" width="220" height="300" rx="16" fill="#FFFFFF" stroke="#22C1A6" stroke-width="1.5" filter="url(#shadow)"/>
<circle cx="640" cy="165" r="40" fill="#E6FAF5"/>
<text x="640" y="165" font-size="28" fill="#2D3748" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">📦</text>
<text x="640" y="225" font-size="16" fill="#22C1A6" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Black Box</text>
<text x="640" y="252" font-size="12" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Can&apos;t explain why</text>
<text x="640" y="270" font-size="12" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">it made a specific</text>
<text x="640" y="288" font-size="12" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">decision or output</text>
<rect x="560" y="310" width="160" height="30" rx="6" fill="#E6FAF5"/>
<text x="640" y="325" font-size="11" fill="#22C1A6" text-anchor="middle" font-weight="500" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">&quot;Can&apos;t explain itself&quot;</text>
<text x="400" y="430" font-size="12" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Knowing these limits helps you use AI more effectively and avoid pitfalls</text>
</svg>