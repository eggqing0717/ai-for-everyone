<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 450" width="750" height="450">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7" fill="#2D3748"/>
</marker>
<filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
  <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
</filter>
</defs>
<rect x="0" y="0" width="750" height="450" rx="0" fill="#F8FAFE"/>
<text x="375" y="30" font-size="18" fill="#2D3748" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">LoRA: Low-Rank Adaptation Architecture</text>

<!-- Input -->
<rect x="310" y="380" width="130" height="40" rx="8" fill="#EBF4FF" stroke="#2E7BF6" stroke-width="1.5"/>
<text x="375" y="400" font-size="14" fill="#2E7BF6" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Input x</text>

<!-- Main path: Original Weight W (frozen) -->
<rect x="170" y="200" width="140" height="80" rx="10" fill="#FEE2E2" stroke="#DC2626" stroke-width="2" stroke-dasharray="6,3"/>
<text x="240" y="230" font-size="15" fill="#DC2626" text-anchor="middle" font-weight="700" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">W</text>
<text x="240" y="252" font-size="11" fill="#991B1B" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">(d x d)</text>
<text x="240" y="270" font-size="10" fill="#DC2626" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">FROZEN</text>

<!-- Arrow from input to W -->
<line x1="340" y1="380" x2="240" y2="285" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arrowhead)"/>

<!-- LoRA path: Matrix A -->
<rect x="440" y="280" width="120" height="60" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="2" filter="url(#shadow)"/>
<text x="500" y="303" font-size="14" fill="#16A34A" text-anchor="middle" font-weight="700" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">A</text>
<text x="500" y="322" font-size="11" fill="#166534" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">(d x r)</text>
<text x="500" y="338" font-size="9" fill="#16A34A" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">TRAINABLE</text>

<!-- Arrow from input to A -->
<line x1="410" y1="380" x2="500" y2="345" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrowhead)"/>

<!-- LoRA path: Matrix B -->
<rect x="440" y="170" width="120" height="60" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="2" filter="url(#shadow)"/>
<text x="500" y="193" font-size="14" fill="#16A34A" text-anchor="middle" font-weight="700" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">B</text>
<text x="500" y="212" font-size="11" fill="#166534" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">(r x d)</text>
<text x="500" y="228" font-size="9" fill="#16A34A" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">TRAINABLE</text>

<!-- Arrow from A to B -->
<line x1="500" y1="275" x2="500" y2="235" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrowhead)"/>

<!-- Scaling factor -->
<circle cx="500" cy="140" r="18" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
<text x="500" y="140" font-size="11" fill="#92400E" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">x a/r</text>

<!-- Arrow from B to scaling -->
<line x1="500" y1="165" x2="500" y2="160" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrowhead)"/>

<!-- Addition node -->
<circle cx="375" cy="100" r="20" fill="#FFFFFF" stroke="#2D3748" stroke-width="2"/>
<text x="375" y="100" font-size="16" fill="#2D3748" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">+</text>

<!-- Arrow from W to addition -->
<line x1="240" y1="195" x2="360" y2="115" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arrowhead)"/>

<!-- Arrow from scaling to addition -->
<line x1="484" y1="128" x2="393" y2="108" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arrowhead)"/>

<!-- Output -->
<rect x="310" y="50" width="130" height="35" rx="8" fill="#EBF4FF" stroke="#2E7BF6" stroke-width="1.5"/>
<text x="375" y="67" font-size="13" fill="#2E7BF6" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Output h</text>

<!-- Arrow from addition to output -->
<line x1="375" y1="78" x2="375" y2="85" stroke="#2D3748" stroke-width="1.5"/>
<line x1="375" y1="85" x2="375" y2="78" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arrowhead)"/>

<!-- Formula at bottom -->
<rect x="60" y="55" width="200" height="50" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="160" y="72" font-size="11" fill="#4A5568" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Formula:</text>
<text x="160" y="92" font-size="12" fill="#2D3748" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">h = Wx + (a/r) BAx</text>

<!-- Legend -->
<rect x="570" y="60" width="160" height="90" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
<text x="650" y="78" font-size="11" fill="#2D3748" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Legend</text>
<rect x="585" y="92" width="16" height="10" rx="3" fill="#FEE2E2" stroke="#DC2626" stroke-width="1" stroke-dasharray="3,2"/>
<text x="614" y="97" font-size="10" fill="#4A5568" text-anchor="start" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Frozen (no grad)</text>
<rect x="585" y="112" width="16" height="10" rx="3" fill="#DCFCE7" stroke="#16A34A" stroke-width="1"/>
<text x="614" y="117" font-size="10" fill="#4A5568" text-anchor="start" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Trainable (LoRA)</text>
<text x="650" y="138" font-size="10" fill="#718096" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">r = rank (8~64)</text>

<!-- Rank annotation -->
<text x="565" y="258" font-size="10" fill="#718096" text-anchor="start" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">r &lt;&lt; d</text>
<text x="565" y="273" font-size="10" fill="#718096" text-anchor="start" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">e.g. r=16,</text>
<text x="565" y="288" font-size="10" fill="#718096" text-anchor="start" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">d=4096</text>

<!-- Parameter savings box -->
<rect x="50" y="360" width="230" height="70" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
<text x="165" y="380" font-size="11" fill="#2D3748" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Parameter Savings</text>
<text x="165" y="400" font-size="10" fill="#718096" text-anchor="middle" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Original W: d x d = 16M params</text>
<text x="165" y="416" font-size="10" fill="#16A34A" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">LoRA A+B: 2 x d x r = 131K (0.8%)</text>
</svg>
