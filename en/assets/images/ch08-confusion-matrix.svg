<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7" fill="#2D3748"/>
</marker>
<filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
  <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
</filter>
</defs>
<rect x="0" y="0" width="600" height="600" rx="0" fill="#F8FAFE"/>
<text x="300" y="40" font-size="24" fill="#2D3748" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Confusion Matrix</text>
<text x="300" y="65" font-size="13" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Binary Classification Evaluation</text>
<text x="300" y="100" font-size="15" fill="#2D3748" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Predicted</text>
<text x="265" y="135" font-size="12" fill="#2E7BF6" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Positive</text>
<text x="435" y="135" font-size="12" fill="#FF8A3D" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Negative</text>
<text x="100" y="310" font-size="15" fill="#2D3748" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Actual</text>
<text x="145" y="235" font-size="12" fill="#2E7BF6" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Pos</text>
<text x="145" y="385" font-size="12" fill="#FF8A3D" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Neg</text>
<rect x="180" y="160" width="170" height="150" rx="8" fill="#22C1A6" opacity="0.2"/>
<rect x="180" y="160" width="170" height="150" rx="8" fill="none" stroke="#22C1A6" stroke-width="2"/>
<text x="265" y="210" font-size="28" fill="#22C1A6" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">TP</text>
<text x="265" y="245" font-size="12" fill="#22C1A6" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">True Positive</text>
<text x="265" y="270" font-size="10" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">✓ Correctly detected</text>
<rect x="350" y="160" width="170" height="150" rx="8" fill="#FF8A3D" opacity="0.15"/>
<rect x="350" y="160" width="170" height="150" rx="8" fill="none" stroke="#FF8A3D" stroke-width="2"/>
<text x="435" y="210" font-size="28" fill="#FF8A3D" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">FP</text>
<text x="435" y="245" font-size="12" fill="#FF8A3D" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">False Positive</text>
<text x="435" y="270" font-size="10" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">✗ False alarm</text>
<rect x="180" y="310" width="170" height="150" rx="8" fill="#FF8A3D" opacity="0.15"/>
<rect x="180" y="310" width="170" height="150" rx="8" fill="none" stroke="#FF8A3D" stroke-width="2"/>
<text x="265" y="360" font-size="28" fill="#FF8A3D" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">FN</text>
<text x="265" y="395" font-size="12" fill="#FF8A3D" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">False Negative</text>
<text x="265" y="420" font-size="10" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">✗ Missed detection</text>
<rect x="350" y="310" width="170" height="150" rx="8" fill="#22C1A6" opacity="0.2"/>
<rect x="350" y="310" width="170" height="150" rx="8" fill="none" stroke="#22C1A6" stroke-width="2"/>
<text x="435" y="360" font-size="28" fill="#22C1A6" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">TN</text>
<text x="435" y="395" font-size="12" fill="#22C1A6" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">True Negative</text>
<text x="435" y="420" font-size="10" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">✓ Correctly rejected</text>
<rect x="100" y="490" width="400" height="70" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5" filter="url(#shadow)"/>
<text x="300" y="515" font-size="13" fill="#2D3748" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Key Metrics</text>
<text x="170" y="540" font-size="11" fill="#2E7BF6" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Precision = TP/(TP+FP)</text>
<text x="400" y="540" font-size="11" fill="#22C1A6" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Recall = TP/(TP+FN)</text>
</svg>