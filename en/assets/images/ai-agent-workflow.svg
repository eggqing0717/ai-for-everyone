<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
<defs>
<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7" fill="#2D3748"/>
</marker>
<filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
  <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
</filter>
</defs>
<rect x="0" y="0" width="800" height="450" rx="0" fill="#F8FAFE"/>
<text x="400" y="35" font-size="20" fill="#2D3748" text-anchor="middle" font-weight="bold" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">AI Agent Workflow: Think-Act-Observe Loop</text>
<rect x="30" y="160" width="120" height="80" rx="12" fill="#EBF4FF" stroke="#2E7BF6" stroke-width="1.5"/>
<text x="90" y="190" font-size="14" fill="#2E7BF6" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">User</text>
<text x="90" y="210" font-size="12" fill="#2D3748" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Goal</text>
<line x1="155" y1="200" x2="200" y2="200" stroke="#2E7BF6" stroke-width="2" marker-end="url(#arrowhead)"/>
<rect x="210" y="80" width="140" height="70" rx="10" fill="#EBF4FF" stroke="#2E7BF6" stroke-width="1.5"/>
<text x="280" y="105" font-size="15" fill="#2E7BF6" text-anchor="middle" font-weight="700" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Think</text>
<text x="280" y="125" font-size="11" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">LLM reasons</text>
<text x="280" y="140" font-size="11" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">about next step</text>
<line x1="355" y1="115" x2="410" y2="115" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<rect x="420" y="80" width="140" height="70" rx="10" fill="#FFF3EB" stroke="#FF8A3D" stroke-width="1.5"/>
<text x="490" y="105" font-size="15" fill="#FF8A3D" text-anchor="middle" font-weight="700" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Act</text>
<text x="490" y="125" font-size="11" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Call tools or</text>
<text x="490" y="140" font-size="11" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">generate content</text>
<line x1="565" y1="115" x2="620" y2="115" stroke="#2D3748" stroke-width="1.5" marker-end="url(#arrowhead)"/>
<rect x="630" y="80" width="140" height="70" rx="10" fill="#E6FAF5" stroke="#22C1A6" stroke-width="1.5"/>
<text x="700" y="105" font-size="15" fill="#22C1A6" text-anchor="middle" font-weight="700" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Observe</text>
<text x="700" y="125" font-size="11" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Check results</text>
<text x="700" y="140" font-size="11" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">from tools</text>
<path d="M700,155 L700,185 Q700,200 685,200 L295,200 Q280,200 280,185 L280,155" fill="none" stroke="#718096" stroke-width="1.5"/>
<polygon points="277,155 280,148 283,155" fill="#718096"/>
<text x="490" y="215" font-size="11" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Not done yet? Loop back</text>
<rect x="380" y="260" width="220" height="130" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
<text x="490" y="280" font-size="13" fill="#2D3748" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Tools</text>
<rect x="395" y="295" width="190" height="18" rx="4" fill="#EBF4FF"/>
<text x="490" y="304" font-size="10" fill="#2E7BF6" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Search Engine</text>
<rect x="395" y="317" width="190" height="18" rx="4" fill="#EBF4FF"/>
<text x="490" y="326" font-size="10" fill="#2E7BF6" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Code Runner</text>
<rect x="395" y="339" width="190" height="18" rx="4" fill="#EBF4FF"/>
<text x="490" y="348" font-size="10" fill="#2E7BF6" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">APIs</text>
<rect x="395" y="361" width="190" height="18" rx="4" fill="#EBF4FF"/>
<text x="490" y="370" font-size="10" fill="#2E7BF6" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Database</text>
<line x1="490" y1="155" x2="490" y2="255" stroke="#FF8A3D" stroke-width="1.5" stroke-dasharray="4,3"/>
<rect x="650" y="300" width="120" height="80" rx="12" fill="#F0FFF4" stroke="#48BB78" stroke-width="1.5"/>
<text x="710" y="330" font-size="14" fill="#276749" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Final</text>
<text x="710" y="350" font-size="14" fill="#276749" text-anchor="middle" font-weight="600" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Output</text>
<text x="710" y="370" font-size="11" fill="#48BB78" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">to User</text>
<line x1="700" y1="200" x2="710" y2="295" stroke="#48BB78" stroke-width="2" marker-end="url(#arrowhead)"/>
<text x="735" y="250" font-size="11" fill="#48BB78" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Done!</text>
<rect x="50" y="410" width="700" height="30" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
<text x="400" y="428" font-size="11" fill="#718096" text-anchor="middle" font-weight="normal" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', sans-serif" dy="0.35em">Agent Loop: User Goal -&gt; Think -&gt; Act (use tools) -&gt; Observe -&gt; Repeat until done</text>
</svg>